<svg xmlns="http://www.w3.org/2000/svg" width="980" height="720" viewBox="0 0 980 720" role="img" aria-labelledby="title desc">
<title id="title">Smart Planner spaced loop visual</title>
<desc id="desc">A calm visual showing a phone preview, spaced review loop, focus timer, and review note.</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0b1020"/><stop offset="0.6" stop-color="#312e81"/><stop offset="1" stop-color="#6d5dfc"/></linearGradient>
  <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#6d5dfc"/><stop offset="1" stop-color="#8b5cf6"/></linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#0f172a" flood-opacity="0.28"/></filter>
</defs>
<rect width="980" height="720" rx="48" fill="url(#bg)"/>
<circle cx="780" cy="130" r="160" fill="#ffffff" opacity="0.08"/>
<circle cx="160" cy="580" r="210" fill="#38bdf8" opacity="0.10"/>
<g filter="url(#shadow)">
  <rect x="90" y="80" width="280" height="560" rx="46" fill="#0f172a"/>
  <rect x="110" y="104" width="240" height="512" rx="34" fill="#f8fafc"/>
  <rect x="130" y="136" width="200" height="34" rx="14" fill="#eef2ff"/>
  <text x="148" y="159" fill="#312e81" font-family="Inter, Arial" font-size="16" font-weight="800">Today</text>
  <rect x="130" y="196" width="200" height="88" rx="20" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="150" y="224" fill="#6d5dfc" font-family="Inter, Arial" font-size="11" font-weight="800">SPACED LOOP</text>
  <text x="150" y="251" fill="#0f172a" font-family="Inter, Arial" font-size="16" font-weight="800">Review notes</text>
  <rect x="150" y="264" width="160" height="8" rx="4" fill="#ede9fe"/><rect x="150" y="264" width="106" height="8" rx="4" fill="url(#accent)"/>
  <rect x="130" y="304" width="200" height="88" rx="20" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="150" y="332" fill="#6d5dfc" font-family="Inter, Arial" font-size="11" font-weight="800">FOCUS TIMER</text>
  <text x="150" y="359" fill="#0f172a" font-family="Inter, Arial" font-size="16" font-weight="800">25m study</text>
  <rect x="150" y="372" width="160" height="8" rx="4" fill="#ede9fe"/><rect x="150" y="372" width="128" height="8" rx="4" fill="url(#accent)"/>
  <rect x="130" y="414" width="200" height="112" rx="20" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="150" y="446" fill="#9a3412" font-family="Inter, Arial" font-size="15" font-weight="800">Recall first</text>
  <text x="150" y="474" fill="#9a3412" font-family="Inter, Arial" font-size="13">Write a short summary</text>
  <text x="150" y="496" fill="#9a3412" font-family="Inter, Arial" font-size="13">in your own words.</text>
</g>
<g filter="url(#shadow)">
  <rect x="450" y="138" width="390" height="108" rx="30" fill="#ffffff" opacity="0.96"/>
  <circle cx="504" cy="192" r="30" fill="#eef2ff"/><text x="489" y="202" fill="#6d5dfc" font-family="Inter, Arial" font-size="22" font-weight="900">1</text>
  <text x="552" y="181" fill="#0f172a" font-family="Inter, Arial" font-size="24" font-weight="900">Capture</text>
  <text x="552" y="211" fill="#64748b" font-family="Inter, Arial" font-size="16">Add what you want to remember.</text>
  <rect x="500" y="306" width="390" height="108" rx="30" fill="#ffffff" opacity="0.96"/>
  <circle cx="554" cy="360" r="30" fill="#eef2ff"/><text x="539" y="370" fill="#6d5dfc" font-family="Inter, Arial" font-size="22" font-weight="900">2</text>
  <text x="602" y="349" fill="#0f172a" font-family="Inter, Arial" font-size="24" font-weight="900">Focus</text>
  <text x="602" y="379" fill="#64748b" font-family="Inter, Arial" font-size="16">Study in a clear, repeatable block.</text>
  <rect x="450" y="474" width="390" height="108" rx="30" fill="#ffffff" opacity="0.96"/>
  <circle cx="504" cy="528" r="30" fill="#eef2ff"/><text x="489" y="538" fill="#6d5dfc" font-family="Inter, Arial" font-size="22" font-weight="900">3</text>
  <text x="552" y="517" fill="#0f172a" font-family="Inter, Arial" font-size="24" font-weight="900">Recall</text>
  <text x="552" y="547" fill="#64748b" font-family="Inter, Arial" font-size="16">Return later and remember first.</text>
</g>
<path d="M374 240 C430 220 426 184 450 184" fill="none" stroke="#c4b5fd" stroke-width="6" stroke-linecap="round" opacity="0.85"/>
<path d="M374 358 C440 358 450 360 500 360" fill="none" stroke="#c4b5fd" stroke-width="6" stroke-linecap="round" opacity="0.85"/>
<path d="M374 482 C424 512 408 528 450 528" fill="none" stroke="#c4b5fd" stroke-width="6" stroke-linecap="round" opacity="0.85"/>
</svg>
